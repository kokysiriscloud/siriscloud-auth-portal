<main class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
  <section class="w-full max-w-md bg-white rounded-2xl shadow p-6 space-y-4">
    <h1 class="text-2xl font-semibold text-slate-800">Aceptar invitación de propietario</h1>
    <p class="text-sm text-slate-500">Dominio: <strong>{{ domain }}</strong></p>

    <form class="space-y-3" [formGroup]="form" (ngSubmit)="submit()">
      <label class="block">
        <span class="text-sm text-slate-700">Nombre completo</span>
        <input class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2" formControlName="fullName" />
      </label>

      <label class="block">
        <span class="text-sm text-slate-700">Contraseña</span>
        <input type="password" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2" formControlName="password" />
      </label>

      <label class="block">
        <span class="text-sm text-slate-700">Confirmar contraseña</span>
        <input type="password" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2" formControlName="confirmPassword" />
      </label>

      <button
        class="w-full rounded-lg bg-indigo-600 text-white py-2 font-medium disabled:opacity-60"
        [disabled]="loading || !token"
      >
        {{ loading ? 'Activando...' : 'Activar cuenta' }}
      </button>
    </form>

    <p *ngIf="error" class="text-sm text-red-600">{{ error }}</p>
    <p *ngIf="success" class="text-sm text-emerald-600">{{ success }}</p>

    <a routerLink="/login" class="text-sm text-indigo-600 hover:underline">Ir a login</a>
  </section>
</main>
